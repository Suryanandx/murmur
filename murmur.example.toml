# murmur.example.toml
# Copy to murmur.toml and edit. API keys should be set via env vars, not here.
# Full docs: https://murmur.dev/docs/configuration

# ── Pipeline ──────────────────────────────────────────────────────────────
[pipeline]
mode = "push-to-talk"    # "push-to-talk" | "vad"
max_recording_s = 30.0   # max seconds per utterance
sentence_min_chars = 20  # min chars before flushing a sentence to TTS
enable_ui = false        # optional web UI at localhost:8765
ui_port = 8765
record_session = false   # save audio + transcript to ~/.murmur/sessions/

# ── Audio ─────────────────────────────────────────────────────────────────
[audio]
sample_rate = 16000
channels = 1
chunk_ms = 30
# input_device = 0    # device index from `murmur devices`
# output_device = 0

# ── VAD (voice activity detection) ────────────────────────────────────────
[vad]
provider = "silero"      # "silero" | "webrtcvad" | "none"
threshold = 0.5
min_silence_ms = 700
min_speech_ms = 250

# ── STT ───────────────────────────────────────────────────────────────────
[stt]
# providers: faster-whisper | groq | deepgram | openai | assemblyai | mock
provider = "faster-whisper"
language = "en"

[stt.config]
model = "base.en"        # tiny.en | base.en | small | medium | large-v3
device = "auto"          # cpu | cuda | auto
# compute_type = "int8"  # int8 | float16 | float32

# ── LLM ───────────────────────────────────────────────────────────────────
[llm]
# providers: openrouter | openai | anthropic | ollama | mock
provider = "openrouter"

# OpenRouter: 100+ models via one key. Free tier available.
# Get key: https://openrouter.ai/keys
# Set key: export OPENROUTER_API_KEY=sk-or-...
model = "mistralai/mistral-7b-instruct:free"

# Other popular models:
# model = "anthropic/claude-3-haiku"          # fast, capable
# model = "openai/gpt-4o-mini"                # cheap GPT-4 class
# model = "meta-llama/llama-3.1-70b-instruct" # open-weight, powerful
# model = "google/gemini-pro-1.5"             # long context
# model = "groq/llama3-8b-8192"              # via Groq, very fast

system_prompt = """You are a helpful voice assistant. Be concise — your responses \
will be spoken aloud, so avoid markdown, bullet points, or long paragraphs. \
Aim for 1-3 sentences per response."""

max_history_turns = 10
temperature = 0.7
max_tokens = 512
stream = true

[llm.config]
# fallback_model = "google/gemma-2-9b-it:free"  # retry on overload/503
# site_url = "https://myapp.com"                 # shown in OpenRouter dashboard
# site_name = "My App"
# timeout = 120.0

# ── TTS ───────────────────────────────────────────────────────────────────
[tts]
# providers: kokoro | piper | elevenlabs | openai | cartesia | edge-tts | mock
provider = "kokoro"
speed = 1.0

# Kokoro voices:
voice = "af_sarah"    # af_sarah | af_bella | af_nicole | am_adam | am_michael
                      # bf_emma | bf_isabella | bm_george | bm_lewis

[tts.config]
lang = "en-us"

# ── ElevenLabs config (when provider = "elevenlabs") ──────────────────────
# [tts.config]
# voice_id = "JBFqnCBsd6RMkjVDRZzb"   # George (default)
# model = "eleven_turbo_v2_5"           # eleven_turbo_v2_5 | eleven_multilingual_v2
# stability = 0.5
# similarity_boost = 0.75
# Set: export ELEVENLABS_API_KEY=...

# ── OpenAI TTS config (when provider = "openai") ──────────────────────────
# [tts.config]
# voice = "nova"      # alloy | echo | fable | onyx | nova | shimmer
# model = "tts-1"     # tts-1 | tts-1-hd
# Set: export OPENAI_API_KEY=...

# ── Edge-TTS config (when provider = "edge-tts") — FREE, no key ──────────
# [tts.config]
# voice = "en-US-AriaNeural"   # run: edge-tts --list-voices
# rate = "+0%"
# volume = "+0%"

# ── Cartesia config (when provider = "cartesia") ──────────────────────────
# [tts.config]
# voice_id = "a0e99841-438c-4a64-b679-ae501e7d6091"
# model = "sonic-english"
# Set: export CARTESIA_API_KEY=...
