  <path d="M10 9 L7 15 L13 15 Z" fill="#fbbf24" opacity="0.8"/>
  <path d="M25 9 L22 15 L28 15 Z" fill="#fbbf24" opacity="0.8"/>
  <line x1="14" y1="20" x2="21" y2="20" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Left label -->
  <text clip-path="url(#clip-left)"
