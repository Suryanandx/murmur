  <text x="490" y="152" font-family="'Inter', sans-serif" font-size="8" fill="#8b5cf6" text-anchor="middle">messages</text>

  <!-- ── LLM BOX ── -->
  <g transform="translate(510, 70)" filter="url(#boxglow)">
    <rect width="130" height="180" rx="12" fill="url(#llmGrad)" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect width="130" height="28" rx="12" fill="#3b1f5e"/>
    <rect x="0" y="16" width="130" height="12" fill="#3b1f5e"/>
    <text x="65" y="19" font-family="'Inter', sans-serif" font-size="11" font-weight="700" fill="#c4b5fd" text-anchor="middle" letter-spacing="1">LLM</text>

    <rect x="10" y="36" width="110" height="18" rx="9" fill="#1a0d3a" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="22" cy="45" r="4" fill="#a78bfa"/>
    <text x="30" y="49" font-family="monospace" font-size="9" fill="#c4b5fd">openrouter ★</text>

    <rect x="10" y="60" width="110" height="18" rx="9" fill="#1a0d3a" stroke="#6d28d9" stroke-width="1"/>
    <circle cx="22" cy="69" r="4" fill="#f59e0b"/>
    <text x="30" y="73" font-family="monospace" font-size="9" fill="#c4b5fd">openai</text>

    <rect x="10" y="84" width="110" height="18" rx="9" fill="#1a0d3a" stroke="#6d28d9" stroke-width="1"/>
    <circle cx="22" cy="93" r="4" fill="#f59e0b"/>
    <text x="30" y="97" font-family="monospace" font-size="9" fill="#c4b5fd">anthropic</text>

    <rect x="10" y="108" width="110" height="18" rx="9" fill="#1a0d3a" stroke="#6d28d9" stroke-width="1"/>
    <circle cx="22" cy="117" r="4" fill="#22c55e"/>
    <text x="30" y="121" font-family="monospace" font-size="9" fill="#c4b5fd">ollama</text>
    <text x="106" y="121" font-family="'Inter', sans-serif" font-size="8" fill="#16a34a" text-anchor="end">local</text>

    <text x="65" y="145" font-family="'Inter', sans-serif" font-size="8" fill="#9333ea" text-anchor="middle">100+ models via</text>
    <text x="65" y="157" font-family="'Inter', sans-serif" font-size="8" fill="#9333ea" text-anchor="middle">OpenRouter</text>

    <text x="65" y="172" font-family="'Inter', sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">→ token stream</text>
  </g>

  <!-- Arrow: LLM → TTS -->
  <line x1="642" y1="160" x2="678" y2="160" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="660" y="152" font-family="'Inter', sans-serif" font-size="8" fill="#22c55e" text-anchor="middle">sentences</text>

  <!-- ── TTS BOX ── -->
  <g transform="translate(680, 70)" filter="url(#boxglow)">
    <rect width="130" height="180" rx="12" fill="url(#ttsGrad)" stroke="#22c55e" stroke-width="1.5"/>
    <rect width="130" height="28" rx="12" fill="#1a3d2e"/>
    <rect x="0" y="16" width="130" height="12" fill="#1a3d2e"/>
    <text x="65" y="19" font-family="'Inter', sans-serif" font-size="11" font-weight="700" fill="#4ade80" text-anchor="middle" letter-spacing="1">TTS</text>

    <rect x="10" y="36" width="110" height="18" rx="9" fill="#0a1f14" stroke="#16a34a" stroke-width="1"/>
    <circle cx="22" cy="45" r="4" fill="#22c55e"/>
    <text x="30" y="49" font-family="monospace" font-size="9" fill="#86efac">kokoro</text>
    <text x="106" y="49" font-family="'Inter', sans-serif" font-size="8" fill="#16a34a" text-anchor="end">local</text>

    <rect x="10" y="60" width="110" height="18" rx="9" fill="#0a1f14" stroke="#15803d" stroke-width="1"/>
    <circle cx="22" cy="69" r="4" fill="#22c55e"/>
    <text x="30" y="73" font-family="monospace" font-size="9" fill="#86efac">piper</text>
    <text x="106" y="73" font-family="'Inter', sans-serif" font-size="8" fill="#16a34a" text-anchor="end">local</text>

    <rect x="10" y="84" width="110" height="18" rx="9" fill="#0a1f14" stroke="#15803d" stroke-width="1"/>
    <circle cx="22" cy="93" r="4" fill="#f59e0b"/>
    <text x="30" y="97" font-family="monospace" font-size="9" fill="#86efac">elevenlabs</text>
    <text x="106" y="97" font-family="'Inter', sans-serif" font-size="8" fill="#f59e0b" text-anchor="end">cloud</text>

    <rect x="10" y="108" width="110" height="18" rx="9" fill="#0a1f14" stroke="#15803d" stroke-width="1"/>
    <circle cx="22" cy="117" r="4" fill="#f59e0b"/>
    <text x="30" y="121" font-family="monospace" font-size="9" fill="#86efac">openai</text>
    <text x="106" y="121" font-family="'Inter', sans-serif" font-size="8" fill="#f59e0b" text-anchor="end">cloud</text>

    <rect x="10" y="132" width="110" height="18" rx="9" fill="#0a1f14" stroke="#15803d" stroke-width="1"/>
    <circle cx="22" cy="141" r="4" fill="#f59e0b"/>
    <text x="30" y="145" font-family="monospace" font-size="9" fill="#86efac">edge-tts</text>
    <text x="106" y="145" font-family="'Inter', sans-serif" font-size="8" fill="#60a5fa" text-anchor="end">free</text>

    <text x="65" y="170" font-family="'Inter', sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">→ PCM audio</text>
  </g>

  <!-- Arrow: TTS → SPEAKER -->
  <line x1="812" y1="160" x2="838" y2="160" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)" stroke-dasharray="4,2"/>

  <!-- ── SPEAKER ── -->
  <g transform="translate(820, 130)">
    <rect x="20" y="0" width="20" height="52" rx="4" fill="#1a3d2e" stroke="#22c55e" stroke-width="1"/>
    <path d="M40 8 Q56 26 40 44" stroke="#22c55e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M40 14 Q50 26 40 38" stroke="#4ade80" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.7"/>
    <text x="30" y="68" font-family="'Inter', sans-serif" font-size="9" fill="#4ade80" text-anchor="middle">Speaker</text>
  </g>

  <!-- Legend -->
  <g transform="translate(30, 272)">
    <circle cx="8" cy="8" r="4" fill="#22c55e"/>
    <text x="18" y="12" font-family="'Inter', sans-serif" font-size="9" fill="#9ca3af">local (no API key)</text>
    <circle cx="108" cy="8" r="4" fill="#f59e0b"/>
    <text x="118" y="12" font-family="'Inter', sans-serif" font-size="9" fill="#9ca3af">cloud (API key required)</text>
    <circle cx="248" cy="8" r="4" fill="#a78bfa"/>
    <text x="258" y="12" font-family="'Inter', sans-serif" font-size="9" fill="#9ca3af">★ recommended default</text>
    <text x="430" y="12" font-family="'Inter', sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">All components are pluggable — swap any provider in murmur.toml</text>
  </g>
</svg>
