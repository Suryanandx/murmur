<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 320" width="860" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a14"/>
      <stop offset="100%" style="stop-color:#111128"/>
    </linearGradient>
    <linearGradient id="sttGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#1e2d4f"/>
    </linearGradient>
    <linearGradient id="llmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b1f5e"/>
      <stop offset="100%" style="stop-color:#2d1849"/>
    </linearGradient>
    <linearGradient id="ttsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3d2e"/>
      <stop offset="100%" style="stop-color:#152e22"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="boxglow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="320" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="430" y="32" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#a78bfa" text-anchor="middle" letter-spacing="3">MURMUR PIPELINE ARCHITECTURE</text>
  <line x1="60" y1="42" x2="800" y2="42" stroke="#6366f1" stroke-width="0.5" opacity="0.3"/>

  <!-- ── MIC INPUT ── -->
  <g transform="translate(30, 90)">
    <rect width="110" height="140" rx="10" fill="#111" stroke="#374151" stroke-width="1"/>
    <text x="55" y="22" font-family="'Inter', sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle" letter-spacing="1">INPUT</text>
    <!-- mic icon -->
    <rect x="39" y="30" width="32" height="48" rx="16" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="47" y="38" width="16" height="24" rx="8" fill="#3b82f6" opacity="0.8"/>
    <path d="M30 62 Q30 86 55 86 Q80 86 80 62" stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <line x1="55" y1="86" x2="55" y2="98" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="44" y1="98" x2="66" y2="98" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
    <text x="55" y="120" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#60a5fa" text-anchor="middle">Microphone</text>
    <text x="55" y="134" font-family="'Inter', sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">+ VAD / PTT</text>
  </g>

  <!-- Arrow: MIC → STT -->
  <line x1="142" y1="160" x2="178" y2="160" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,2"/>
  <text x="160" y="152" font-family="'Inter', sans-serif" font-size="8" fill="#6366f1" text-anchor="middle">PCM</text>

  <!-- ── STT BOX ── -->
  <g transform="translate(180, 70)" filter="url(#boxglow)">
    <rect width="130" height="180" rx="12" fill="url(#sttGrad)" stroke="#3b82f6" stroke-width="1.5"/>
    <rect width="130" height="28" rx="12" fill="#1e3a5f"/>
    <rect x="0" y="16" width="130" height="12" fill="#1e3a5f"/>
    <text x="65" y="19" font-family="'Inter', sans-serif" font-size="11" font-weight="700" fill="#60a5fa" text-anchor="middle" letter-spacing="1">STT</text>

    <!-- provider pills -->
    <rect x="10" y="36" width="110" height="18" rx="9" fill="#0c1f3a" stroke="#1d4ed8" stroke-width="1"/>
    <circle cx="22" cy="45" r="4" fill="#22c55e"/>
    <text x="30" y="49" font-family="monospace" font-size="9" fill="#93c5fd">faster-whisper</text>
    <text x="106" y="49" font-family="'Inter', sans-serif" font-size="8" fill="#16a34a" text-anchor="end">local</text>

    <rect x="10" y="60" width="110" height="18" rx="9" fill="#0c1f3a" stroke="#1d4ed8" stroke-width="1"/>
    <circle cx="22" cy="69" r="4" fill="#f59e0b"/>
    <text x="30" y="73" font-family="monospace" font-size="9" fill="#93c5fd">groq</text>
    <text x="106" y="73" font-family="'Inter', sans-serif" font-size="8" fill="#f59e0b" text-anchor="end">cloud</text>

    <rect x="10" y="84" width="110" height="18" rx="9" fill="#0c1f3a" stroke="#1d4ed8" stroke-width="1"/>
    <circle cx="22" cy="93" r="4" fill="#f59e0b"/>
    <text x="30" y="97" font-family="monospace" font-size="9" fill="#93c5fd">deepgram</text>
    <text x="106" y="97" font-family="'Inter', sans-serif" font-size="8" fill="#f59e0b" text-anchor="end">cloud</text>

    <rect x="10" y="108" width="110" height="18" rx="9" fill="#0c1f3a" stroke="#1d4ed8" stroke-width="1"/>
    <circle cx="22" cy="117" r="4" fill="#f59e0b"/>
    <text x="30" y="121" font-family="monospace" font-size="9" fill="#93c5fd">openai</text>
    <text x="106" y="121" font-family="'Inter', sans-serif" font-size="8" fill="#f59e0b" text-anchor="end">cloud</text>

    <rect x="10" y="132" width="110" height="18" rx="9" fill="#0c1f3a" stroke="#1d4ed8" stroke-width="1"/>
    <circle cx="22" cy="141" r="4" fill="#f59e0b"/>
    <text x="30" y="145" font-family="monospace" font-size="9" fill="#93c5fd">assemblyai</text>
    <text x="106" y="145" font-family="'Inter', sans-serif" font-size="8" fill="#f59e0b" text-anchor="end">cloud</text>

    <text x="65" y="170" font-family="'Inter', sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">→ transcript text</text>
  </g>

  <!-- Arrow: STT → ORCHESTRATOR -->
  <line x1="312" y1="160" x2="348" y2="160" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="330" y="152" font-family="'Inter', sans-serif" font-size="8" fill="#8b5cf6" text-anchor="middle">text</text>

  <!-- ── ORCHESTRATOR ── -->
  <g transform="translate(350, 108)">
    <rect width="120" height="104" rx="12" fill="#1a1030" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="60" y="20" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#a78bfa" text-anchor="middle">ORCHESTRATOR</text>
    <text x="60" y="36" font-family="'Inter', sans-serif" font-size="8" fill="#7c3aed" text-anchor="middle">PipelineSession</text>
    <line x1="10" y1="44" x2="110" y2="44" stroke="#4c1d95" stroke-width="0.5"/>
    <text x="60" y="58" font-family="'Inter', sans-serif" font-size="8" fill="#9ca3af" text-anchor="middle">conversation history</text>
    <text x="60" y="72" font-family="'Inter', sans-serif" font-size="8" fill="#9ca3af" text-anchor="middle">state machine</text>
    <text x="60" y="86" font-family="'Inter', sans-serif" font-size="8" fill="#9ca3af" text-anchor="middle">sentence splitter</text>
    <text x="60" y="100" font-family="'Inter', sans-serif" font-size="8" fill="#9ca3af" text-anchor="middle">event bus</text>
  </g>

