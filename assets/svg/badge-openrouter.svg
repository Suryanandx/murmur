<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 196 28" width="196" height="28">
  <defs>
    <linearGradient id="left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <clipPath id="clip-left"><rect width="88" height="28" rx="6"/></clipPath>
    <clipPath id="clip-right"><rect x="88" width="108" height="28" rx="6"/></clipPath>
  </defs>

  <!-- Background: full rounded rect -->
  <rect width="196" height="28" rx="6" fill="url(#left)"/>
  <!-- Right half overlay -->
  <rect x="88" width="108" height="28" rx="6" fill="url(#right)"/>
  <!-- Seam cover (sharp left edge of right rect) -->
  <rect x="88" width="10" height="28" fill="url(#right)"/>

  <!-- Left: icon dots -->
  <circle cx="16" cy="14" r="4" fill="#a78bfa" opacity="0.9"/>
  <circle cx="26" cy="14" r="3" fill="#8b5cf6" opacity="0.7"/>
  <circle cx="34" cy="14" r="2" fill="#6366f1" opacity="0.5"/>

  <!-- Left label — clipped to left half -->
  <text clip-path="url(#clip-left)"
    x="44" y="19"
    font-family="'Inter', 'Helvetica Neue', sans-serif"
    font-size="11" font-weight="600" fill="#e2e8f0">LLM via</text>

  <!-- Right label -->
  <text x="100" y="19"
    font-family="'Inter', 'Helvetica Neue', sans-serif"
    font-size="11" font-weight="700" fill="#ffffff">OpenRouter</text>
</svg>
