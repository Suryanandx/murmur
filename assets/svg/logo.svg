<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.5"/>
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="120" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="60" x2="480" y2="60" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="120" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Waveform visualization (left icon area) -->
  <!-- Wave bars — simulating an audio waveform -->
  <g transform="translate(20, 60)" filter="url(#glow)">
    <!-- bars with varying heights -->
    <rect x="0"  y="-8"  width="4" height="16" rx="2" fill="url(#wave1)" opacity="0.6"/>
    <rect x="7"  y="-18" width="4" height="36" rx="2" fill="url(#wave1)" opacity="0.8"/>
    <rect x="14" y="-28" width="4" height="56" rx="2" fill="url(#wave1)" opacity="1.0"/>
    <rect x="21" y="-14" width="4" height="28" rx="2" fill="url(#wave1)" opacity="0.9"/>
    <rect x="28" y="-32" width="4" height="64" rx="2" fill="url(#wave2)" opacity="1.0"/>
    <rect x="35" y="-22" width="4" height="44" rx="2" fill="url(#wave2)" opacity="0.9"/>
    <rect x="42" y="-36" width="4" height="72" rx="2" fill="url(#wave1)" opacity="1.0"/>
    <rect x="49" y="-18" width="4" height="36" rx="2" fill="url(#wave1)" opacity="0.8"/>
    <rect x="56" y="-10" width="4" height="20" rx="2" fill="url(#wave2)" opacity="0.7"/>
    <rect x="63" y="-6"  width="4" height="12" rx="2" fill="url(#wave1)" opacity="0.5"/>
  </g>

  <!-- Microphone icon (circle) -->
  <circle cx="116" cy="60" r="22" fill="#1e1e3f" stroke="#6366f1" stroke-width="1.5" opacity="0.8"/>
  <rect x="110" y="46" width="12" height="18" rx="6" fill="#8b5cf6" filter="url(#glow)"/>
  <path d="M106 62 Q106 72 116 72 Q126 72 126 62" stroke="#a78bfa" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <line x1="116" y1="72" x2="116" y2="78" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="111" y1="78" x2="121" y2="78" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text
    x="152"
    y="72"
    font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', sans-serif"
    font-size="42"
    font-weight="700"
    letter-spacing="-1"
    fill="url(#textGrad)"
    filter="url(#softglow)"
  >murmur</text>

  <!-- Tagline -->
  <text
    x="153"
    y="92"
    font-family="'SF Pro Text', 'Inter', 'Helvetica Neue', sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="2"
    fill="#6366f1"
    opacity="0.8"
  >VOICE · PIPELINE · OPEN SOURCE</text>

  <!-- Small version badge -->
  <rect x="432" y="10" width="36" height="16" rx="8" fill="#6366f1" opacity="0.2"/>
  <text x="450" y="22" font-family="monospace" font-size="9" fill="#a78bfa" text-anchor="middle">v0.1</text>
</svg>
