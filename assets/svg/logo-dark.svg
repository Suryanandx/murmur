<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- White background for light mode -->
  <rect width="480" height="120" rx="16" fill="#ffffff"/>
  <rect width="480" height="120" rx="16" fill="#f8f7ff" opacity="0.5"/>

  <!-- Waveform bars -->
  <g transform="translate(20, 60)" filter="url(#glow)">
    <rect x="0"  y="-8"  width="4" height="16" rx="2" fill="url(#wave1)" opacity="0.5"/>
    <rect x="7"  y="-18" width="4" height="36" rx="2" fill="url(#wave1)" opacity="0.7"/>
    <rect x="14" y="-28" width="4" height="56" rx="2" fill="url(#wave1)" opacity="0.9"/>
    <rect x="21" y="-14" width="4" height="28" rx="2" fill="url(#wave1)" opacity="0.8"/>
    <rect x="28" y="-32" width="4" height="64" rx="2" fill="url(#wave2)" opacity="0.9"/>
    <rect x="35" y="-22" width="4" height="44" rx="2" fill="url(#wave2)" opacity="0.8"/>
    <rect x="42" y="-36" width="4" height="72" rx="2" fill="url(#wave1)" opacity="0.9"/>
    <rect x="49" y="-18" width="4" height="36" rx="2" fill="url(#wave1)" opacity="0.7"/>
    <rect x="56" y="-10" width="4" height="20" rx="2" fill="url(#wave2)" opacity="0.6"/>
    <rect x="63" y="-6"  width="4" height="12" rx="2" fill="url(#wave1)" opacity="0.4"/>
  </g>

  <!-- Microphone icon -->
  <circle cx="116" cy="60" r="22" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="110" y="46" width="12" height="18" rx="6" fill="#7c3aed"/>
  <path d="M106 62 Q106 72 116 72 Q126 72 126 62" stroke="#7c3aed" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <line x1="116" y1="72" x2="116" y2="78" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="111" y1="78" x2="121" y2="78" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text
    x="152"
    y="72"
    font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', sans-serif"
    font-size="42"
    font-weight="700"
    letter-spacing="-1"
    fill="url(#textGrad)"
  >murmur</text>

  <!-- Tagline -->
  <text
    x="153"
    y="92"
    font-family="'SF Pro Text', 'Inter', 'Helvetica Neue', sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="2"
    fill="#7c3aed"
    opacity="0.7"
  >VOICE · PIPELINE · OPEN SOURCE</text>

  <rect x="432" y="10" width="36" height="16" rx="8" fill="#ede9fe"/>
  <text x="450" y="22" font-family="monospace" font-size="9" fill="#7c3aed" text-anchor="middle">v0.1</text>
</svg>
